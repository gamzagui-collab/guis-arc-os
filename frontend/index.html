<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GUI's Arc OS v9.3.9</title>
  <link rel="stylesheet" href="./css/design-system.css">
  <link rel="stylesheet" href="./css/app.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <header class="topbar app-header">
    <div class="app-brand">
      <img class="brand-logo" src="./assets/guis-arc-os-logo.svg" alt="GUI's Arc OS logo">
      <div><h1>GUI's Arc OS <span class="version-pill">v9.3.9</span></h1><p>Construction Site Operating System</p></div>
    </div>
    <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="메뉴 열기">☰</button>
    <nav class="main-tabs header-tabs">
      <button data-page="dashboardPage" class="tab active">HOME</button>
      <button data-page="todayPage" class="tab">오늘업무</button>
      <button data-page="directorPage" class="tab">현장소장</button>
      <button data-page="safetyPage" class="tab">안전관리</button>
      <button data-page="qualityPage" class="tab">품질관리</button>
      <button data-page="constructionPage" class="tab">공사관리</button>
      <button data-page="resourcePage" class="tab">자재·장비</button>
      <button data-page="knowledgePage" class="tab">DB</button>
      <button data-page="schedulePage" class="tab">일정</button>
      <button data-page="weatherPage" class="tab">날씨</button>
      <button data-page="briefingPage" class="tab">사고·뉴스</button>
      <button data-page="settingsPage" class="tab">설정</button>
    </nav>
    <div class="header-site"><span id="headerSiteName">Guest</span><span class="user-chip">Guest</span><button id="resetLoginBtn" class="header-login-btn">현장선택</button></div>
  </header>

  <main id="app" class="app-shell">
    <section id="loginPage" class="page active login-page-v939">
      <div class="hero-card">
        <span class="eyebrow">GUI's Arc OS</span>
        <h2>현장별로 관리하는 건설현장 운영체계</h2>
        <p>Guest로 바로 시작하거나, 현장코드 + PIN으로 현장 데이터를 불러오고 저장합니다.</p>
      </div>

      <div class="login-grid">
        <article class="big-card">
          <h3>Guest 시작</h3>
          <p>PC 브라우저에 임시 저장합니다. 테스트와 개인 사용에 적합합니다.</p>
          <button id="guestStartBtn" class="primary-btn">Guest로 시작</button>
        </article>

        <article class="big-card">
          <h3>현장 접속</h3>
          <p>현장코드 + PIN으로 D1 서버 DB의 현장 데이터를 불러옵니다.</p>
          <label>현장코드<input id="siteCodeInput" placeholder="예: GIMJE-SCHOOL-001"></label>
          <label>PIN<input id="sitePinInput" type="password" placeholder="예: 1234"></label>
          <button id="siteLoginBtn" class="primary-btn">현장 접속</button>
          <button id="openCreateSiteBtn" class="secondary-btn">새 현장 등록</button>
        </article>
      </div>

      <div id="createSitePanel" class="big-card create-site-panel" hidden>
        <h3>새 현장 등록</h3>
        <div class="form-grid">
          <label>현장명<input id="newSiteName" placeholder="예: 김제 OO초등학교 신축공사"></label>
          <label>현장코드<input id="newSiteCode" placeholder="예: GIMJE-SCHOOL-001"></label>
          <label>PIN<input id="newSitePin" placeholder="예: 1234"></label>
          <label>현장형태
            <select id="newSiteType">
              <option value="school">학교</option>
              <option value="apartment">아파트</option>
              <option value="office">오피스·관공서</option>
              <option value="factory">공장·창고</option>
              <option value="culture">문화시설·체육관</option>
              <option value="civil">도로·교량·터널</option>
            </select>
          </label>
          <label>발주처<input id="newClientName" placeholder="예: 전북교육청"></label>
          <label>시공사<input id="newContractorName" placeholder="예: OO건설"></label>
          <label>감리사<input id="newSupervisorName" placeholder="예: OO감리"></label>
          <label>공사규모<input id="newScaleText" placeholder="예: 지하1층/지상4층, 연면적 8,000㎡"></label>
        </div>
        <button id="createSiteBtn" class="primary-btn">현장 등록 후 시작</button>
      </div>
    </section>

    <section id="homePage" class="page">
      

      <div id="dashboardPage" class="subpage active"></div>
      <div id="todayPage" class="subpage"></div>
      <div id="directorPage" class="subpage"></div>
      <div id="safetyPage" class="subpage"></div>
      <div id="constructionPage" class="subpage"></div>
      <div id="resourcePage" class="subpage"></div>
      <div id="knowledgePage" class="subpage"></div>
      <div id="sitePage" class="subpage"></div>
      <div id="weatherPage" class="subpage"></div>
      <div id="healthPage" class="subpage"></div>
      <div id="schedulePage" class="subpage"></div>
      <div id="guidePage" class="subpage"></div>
      <div id="qualityPage" class="subpage"></div>
      <div id="dbPage" class="subpage"></div>
      <div id="briefingPage" class="subpage"></div>
      <div id="assistantPage" class="subpage"></div>
      <div id="chatPage" class="subpage"></div>
      <div id="settingsPage" class="subpage"></div>
    </section>
  </main>

  <script type="module" src="./js/core/app.js"></script>
</body>
</html>
