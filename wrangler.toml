name = "guis-arc-os-api"
main = "backend/src/index.js"
compatibility_date = "2026-07-07"

[[d1_databases]]
binding = "DB"
database_name = "guis_arc_os"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
APP_VERSION = "7.0.0"
APP_NAME = "GUI's Arc OS"
